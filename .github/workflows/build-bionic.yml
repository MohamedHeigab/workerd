name: Build native Termux Bionic

on:
  push:
    branches: [ "termux-bionic-build" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build in Termux Docker
        run: |
          mkdir -p out
          docker run --rm \
            -v ${{ github.workspace }}:/host-workspace \
            termux/termux-docker:aarch64 \
            /data/data/com.termux/files/usr/bin/bash -c "
              cp -r /host-workspace ~/workerd &&
              cd ~/workerd &&
              export DEBIAN_FRONTEND=noninteractive &&
              pkg upgrade -y -o Dpkg::Options::=\"--force-confnew\" &&
              pkg install -y tur-repo &&
              pkg install -y bazel8 nodejs python rust git wget lld binutils libc++ clang &&
              npm install -g pnpm@latest &&
              pnpm install --no-frozen-lockfile &&
              bazel8 build --config=release_linux //src/workerd/server:workerd &&
              cp bazel-bin/src/workerd/server/workerd /host-workspace/out/workerd-bionic-arm64
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: workerd-bionic-arm64
          path: out/workerd-bionic-arm64
