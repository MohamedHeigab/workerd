name: Build native Termux Bionic

on:
  push:
    branches: [ "termux-bionic-build" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build in Termux Docker
        run: |
          mkdir -p out
          docker run --rm \
            -v ${{ github.workspace }}:/workerd \
            -w /workerd \
            termux/termux-docker:aarch64 \
            /data/data/com.termux/files/usr/bin/bash -c "
              pkg update -y &&
              pkg install -y tur-repo &&
              pkg install -y bazel8 nodejs python rust git wget lld binutils libc++ clang &&
              npm install -g pnpm@latest &&
              pnpm install --no-frozen-lockfile &&
              bazel build --config=release_linux //src/workerd/server:workerd &&
              cp bazel-bin/src/workerd/server/workerd /workerd/out/workerd-bionic-arm64
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: workerd-bionic-arm64
          path: out/workerd-bionic-arm64
